<html>
  <head>
    <title>CSS Flexbox</title>
    <style>
      .one {
        width: 200px;
        height: 200px;
        background-color: aqua;
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .two {
        width: 200px;
        height: 200px;
        background-color: rgb(151, 235, 49);
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .three {
        width: 200px;
        height: 200px;
        background-color: rgb(205, 231, 59);
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .four {
        width: 200px;
        height: 200px;
        background-color: rgb(203, 182, 15);
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .five {
        width: 200px;
        height: 200px;
        background-color: rgb(115, 7, 41);
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .six {
        width: 200px;
        height: 200px;
        background-color: rgb(2, 41, 41);
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .main {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        height: 100vh;
        justify-content:left;
        align-items: flex-start;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
      <div class="four">4</div>
      <div class="five">5</div>
      <div class="six">6</div>
    </div>
  </body>
</html>
