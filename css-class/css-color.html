<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css colors</title>

      h1 {
        color: rgb(183, 44, 44);
      }
      h2 {
        color: rgba(153, 26, 26, 0.8);
