<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Grid Layout</title>
    <style>
      .one {
        height: 400px;
        width: auto;
        background-color: blue;
        border: 2px solid black;
      }
      .two {
        height: 400px;
        width: auto;
        background-color: rgb(10, 108, 219);
        border: 2px solid black;
      }
       .three {
   height: 400px;
   width: auto;
   background-color: rgba(228, 131, 19, 0.87);
   border: 2px solid black;
 }
      .main {
        display: grid;
        grid-template-columns: 30% 40% 30%;
        column-gap: 20px;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
    </div>
  </body>
</html>
