<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Text Learning</title>
    <style>
      h1 {
        color: aquamarine;
        text-decoration-line: underline overline;
        text-decoration-color: red;
        text-decoration-style: dashed;
        text-decoration-thickness: 5px;
        text-transform: capitalize;
        text-align: center;
      }
      p {
        text-indent: 30px;
        letter-spacing: 2px;
        word-spacing: 20px;
        line-height: 20px;
      }
    </style>
  </head>
  <body>
    <h1>hello world</h1>
    <p>
      Lorem ipsum, dolor sit amet consectetur adipisicing elit. Accusamus quis
      quam maxime facilis ipsa. Neque impedit in, dolor aperiam libero, autem
      exercitationem vitae aliquid minus possimus temporibus? Ducimus, corporis
      ipsum.
    </p>
  </body>
</html>
