<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Absolute</title>
    <style>
        .outer{
          height: 400px;
          width: 800px;
         
          border: 2px solid black;
        }
        .inner{
            position: absolute;
            top: 70px;
            right: 20px;
        }
    </style>
  </head>
  <body>
    <div class="outer">
      <div class="inner">Inner Text</div>
    </div>
  </body>
</html>
