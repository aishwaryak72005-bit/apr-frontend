<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Position</title>
    <style>
      .one {
        height: 300px;
        width: 1000px;
        /* this is an explaination for position static*/
        /*position: static;
        top: 150px;
        left: 100px;*/ 
        border: 2px solid blue;
        background-color: aqua;
      }
      .two {
        height: 300px;
        width: 1000px;
        /*position: fixed;
        top: 300px;
        left: 200px;*/
        position:sticky;
        top: 80px;
        border: 2px solid blue;
        background-color: rgb(7, 56, 162);
      }
      .three {
        height: 300px;
        width: 1000px;
        border: 2px solid blue;
        background-color: rgb(2, 32, 32);
      }
      .four {
        height: 300px;
        width: 1000px;
        border: 2px solid blue;
        background-color: rgb(90, 165, 14);
      }
      .five {
        height: 300px;
        width: 1000px;
        border: 2px solid blue;
        background-color: rgb(129, 9, 119);
      }
      .six {
        height: 300px;
        width: 1000px;
        border: 2px solid blue;
        background-color: rgb(240, 19, 82);
      }
    </style>
  </head>
  <body>
    <div class="one">One</div>
    <div class="two">Two</div>
    <div class="three">Three</div>
    <div class="four">Four</div>
    <div class="five">Five</div>
    <div class="six">Six</div>
  </body>
</html>
