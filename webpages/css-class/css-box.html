<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Box</title>
    <style>
      .one {
        height: 300px;
        width: 400px;
        border: 2px solid black;
        text-align: center;
        background-color: aqua;
      }
      .two {
        height: 300px;
        width: 400px;
        border: 2px solid black;
        text-align: center;
        padding: 50px;
        box-sizing: border-box;
        background-color: rgb(240, 72, 136);
      }
    </style>
  </head>
  <body>
    <div class="one">Class One</div>
    <div class="two">Class Two</div>
  </body>
</html>
