<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sports Webpage</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .banner {
        width: 100%;
        height: 100vh;
        background-image: url("https://rukminim2.flixcart.com/image/1536/1536/xif0q/shoe/k/l/z/-original-imahgbrywfru9m98.jpeg?q=90");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        position: relative;
      }

      .container {
        position: absolute;
        bottom: 50px;
        left: 50px;
        max-width: 500px;
        color: white;
      }
      .container h1 {
        font-size: 55px;
        margin-bottom: 15px;
      }
      .container p {
        margin-bottom: 20px;
        font-size: 20px;
        line-height: 1.5;
      }
      .container button {
        padding: 12px 30px;
        border: none;
        border-radius: 5px;
        background: rgb(9, 29, 29);
        font-size: 18px;
        color: beige;
      }
    </style>
  </head>
  <body>
    <div class="banner">
      <div class="container">
        <h1>Run With Style</h1>
        <p>
          Explore premium jogging shoes designed,for comfort ,speed,and everday
          usage
        </p>
        <button>Shop Now</button>
      </div>
    </div>
  </body>
</html>
