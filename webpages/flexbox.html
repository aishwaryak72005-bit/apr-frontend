<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flex example page</title>
    <style>
      .main {
        margin-top: 50px;
        margin-left: 50px;
        display: flex;
        flex-direction: row;
      }
      .two {
        margin-left: 50px;
      }
      .btn {
        background-color: rgb(6, 16, 91);
        border-radius: 20px;
        line-height: 20px;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">
        <img
          src="https://rukminim1.flixcart.com/image/1536/1536/xif0q/mobile/c/e/5/-original-imahft5g9uthykuh.jpeg?q=90"
          height="250px"
          width="250px"
        />
      </div>
      <div class="two">
        <h1>Iphone 32 GB</h1>
        <p>Features</p>
        <ul>
          <li>32 Gb storage</li>
          <li>6 Gb RAM</li>
          <li>5g support</li>
          <li>50 MP Rear camera</li>
        </ul>
        <button class="btn">Buy Now</button>
        <button class="btn">Add to cart</button>
      </div>
    </div>
  </body>
</html>
