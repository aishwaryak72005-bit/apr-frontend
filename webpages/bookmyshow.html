<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!--Bootstrap css-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      .des{
        display: flex;
        flex-wrap: wrap;
        justify-content: space-evenly;
      }
    </style>
  </head>
  <body>
    <!--Modal-strat-->
    <!-- Button trigger modal -->
    <button
      type="button"
      class="btn btn-primary"
      data-bs-toggle="modal"
      data-bs-target="#exampleModal"
    >
      Launch demo modal
    </button>

    <!-- Modal -->
    <div
      class="modal fade"
      id="exampleModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class= "des">
              <div>
                <img
                  src="https://assets-in.bmscdn.com/m6/images/common-modules/regions/mumbai-selected.png"
                />
                <h5>Mumbai</h5>
              </div>
              <div>
                <img
                  src="https://assets-in.bmscdn.com/m6/images/common-modules/regions/bang-selected.png"
                  alt=""
                />
                <h5>Banglore</h5>
              </div>
              <div>
                <img
                  src="https://assets-in.bmscdn.com/m6/images/common-modules/regions/hyd.png"
                  alt=""
                />
                <h5>Hyderabad</h5>
              </div>
              <div>
                <img
                  src="https://assets-in.bmscdn.com/m6/images/common-modules/regions/chen-selected.png"
                  alt=""
                />
                <h5>Chennai</h5>
              </div>
              <div>
                <img
                  src="https://assets-in.bmscdn.com/m6/images/common-modules/regions/koch-selected.png"
                  alt=""
                />
                <h5>Kochi</h5>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button type="button" class="btn btn-primary">Save changes</button>
          </div>
        </div>
      </div>
    </div>
    <!--Modal-end-->
    <!--Bootstrap script-->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
